name: CI/CD

on:
  push:
    branches:
      - master
      - stage
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy-prod:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push PROD
        run: |
          docker build -t ghcr.io/othavio-oth/strategy:latest .
          docker push ghcr.io/othavio-oth/strategy:latest

      - name: Deploy PROD on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/strategy/strategy_backend
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -p strategy-prod pull
            docker compose -p strategy-prod up -d

  deploy-stage:
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy STAGE on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/strategy/strategy_backend_stage
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose pull
            docker compose up -d
