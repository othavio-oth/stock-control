name: CI/CD

on:
  push:
    branches:
      - master
      - stage
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy-prod:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (prod)
        env:
          IMAGE_LATEST: "ghcr.io/othavio-oth/strategy:latest"
          IMAGE_SHA: "ghcr.io/othavio-oth/strategy:${{ github.sha }}"
        run: |
          docker build -t "$IMAGE_LATEST" -t "$IMAGE_SHA" .
          docker push "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"

      - name: Upload compose file to VM (PROD)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "${{ secrets.DEPLOY_PATH }}"
          overwrite: true

      - name: Deploy PROD (SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -p strategy-prod pull
            docker compose -p strategy-prod up -d --force-recreate
            docker compose -p strategy-prod ps

  build-stage:
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (stage)
        env:
          IMAGE_STAGE: "ghcr.io/othavio-oth/strategy:stage"
        run: |
          docker build -t "$IMAGE_STAGE" .
          docker push "$IMAGE_STAGE"
