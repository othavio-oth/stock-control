version: "3.9"

services:
  # Serviço de captura de e-mails para desenvolvimento
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: strategy_mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI Web
      - "1025:1025"   # SMTP
    networks:
      - rede_strategy_inventory

  strategy_backend_inventory:
    environment:
      # SMTP via variáveis/Secrets (GitHub/VM/.env). Se quiser usar MailHog local, defina:
      # SMTP_HOST=mailhog, SMTP_PORT=1025
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TO: ${SMTP_TO}
      # Rotas de debug (/_debug/*). Ative conforme o ambiente.
      ENABLE_DEBUG_ROUTES: ${ENABLE_DEBUG_ROUTES:-false}
    depends_on:
      - mailhog

networks:
  rede_strategy_inventory:
    external: false
