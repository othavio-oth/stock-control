services:
  strategy_db_inventory:
    image: postgres:15
    container_name: strategy_db_inventory_stage
    env_file:
      - .env.stage
    networks:
      - rede_strategy_inventory
    volumes:
      - postgres_data_stage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  strategy_backend_inventory:
    image: ghcr.io/othavio-oth/strategy:staging
    container_name: strategy_backend_inventory_stage
    env_file:
      - .env.stage
    ports:
      - "127.0.0.1:8100:8000"
    depends_on:
      strategy_db_inventory:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8100/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rede_strategy_inventory

volumes:
  postgres_data_stage:
