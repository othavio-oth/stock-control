version: "3.9"

services:
  strategy_db:
    image: postgres:15
    container_name: strategy_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rede_strategy_inventory

  strategy_backend:
    image: ghcr.io/othavio-oth/strategy:${IMAGE_TAG:-latest}
    container_name: strategy_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      strategy_db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    networks:
      - rede_strategy_inventory

networks:
  rede_strategy_inventory:

volumes:
  postgres_data:

