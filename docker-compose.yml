services:
  strategy_db_inventory:
    image: postgres:15
    restart: unless-stopped
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [rede_strategy_inventory]

  strategy_backend_inventory:
    image: ghcr.io/othavio-oth/strategy:latest
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      strategy_db_inventory:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/ping', timeout=3).getcode()==200 else sys.exit(1)\""]
      interval: 15s
      timeout: 5s
      retries: 10


    networks: [rede_strategy_inventory]

networks:
  rede_strategy_inventory:

volumes:
  postgres_data:
