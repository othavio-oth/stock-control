services:
  strategy_db_inventory:
    image: postgres:15
    container_name: strategy_db_inventory
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "5433:5432"
    networks:
      - rede_strategy_inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  strategy_backend_inventory:
    build: .
    container_name: strategy_backend_inventory
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - rede_strategy_inventory
    depends_on:
      strategy_db_inventory:
        condition: service_healthy
    volumes:
      - ./app:/app/app 
      - .:/app
    command: >
      sh -c "uvicorn app.api.main:app --host 0.0.0.0 --port 8000"

networks:
  rede_strategy_inventory:

volumes:
  postgres_data: