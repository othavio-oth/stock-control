services:
  strategy_db_inventory:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rede_strategy_inventory

  strategy_backend_inventory:
    build: .
    container_name: strategy_backend_inventory
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      strategy_db_inventory:
        condition: service_healthy
    networks:
      - rede_strategy_inventory

networks:
  rede_strategy_inventory:

volumes:
  postgres_data:
    external: true
    name: strategy-prod_postgres_data